name: Build and push (Production)

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build-web:
    name: Build web image
    runs-on: am-github-runner
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/aplinkosministerija/finansai:Production
          build-args: |
            ENVIRONMENT=production
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-api:
    name: Build api image
    runs-on: am-github-runner
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/aplinkosministerija/finansai-api:Production
          build-args: |
            ENVIRONMENT=production
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  trigger-deploy:
    name: Trigger biip-infra deploy
    needs: [build-web, build-api]
    runs-on: am-github-runner
    steps:
      - env:
          GH_TOKEN: ${{ secrets.BIIP_INFRA_DEPLOY_TOKEN }}
        run: |
          gh workflow run deploy-environment.yml \
            --repo AplinkosMinisterija/biip-infra \
            --ref main \
            -f environment=Production
